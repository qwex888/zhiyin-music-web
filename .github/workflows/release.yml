name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '重新发布的 tag（如 v0.6.1）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.ref }}

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Archive build output
        run: tar -czf dist.tar.gz dist

      - name: Generate release notes
        id: release_notes
        run: |
          # 获取上一个 tag（如果存在）
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURRENT_TAG="${{ steps.tag.outputs.ref }}"

          if [ -z "$PREV_TAG" ]; then
            # 第一个 tag，获取所有 commit
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            # 获取两个 tag 之间的 commit
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${CURRENT_TAG})
          fi

          # 写入多行内容到 GITHUB_OUTPUT
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-}...${CURRENT_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.ref }}"
          NOTES="${{ steps.release_notes.outputs.notes }}"

          # 本地 release.sh 可能已创建空 Release；此处幂等上传 dist.tar.gz
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG 已存在，上传/更新 dist.tar.gz..."
            gh release upload "$TAG" dist.tar.gz --clobber
            gh release edit "$TAG" --title "Release $TAG" --notes "$NOTES"
          else
            gh release create "$TAG" dist.tar.gz \
              --title "Release $TAG" \
              --notes "$NOTES"
          fi
