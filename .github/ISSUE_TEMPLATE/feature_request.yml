name: Feature Request
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的想法。
  - type: textarea
    id: motivation
    attributes:
      label: 动机 / 背景
      description: 为什么需要这个功能？解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 详细描述期望的功能行为
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他替代方案？
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关截图、参考链接等
    validations:
      required: false
