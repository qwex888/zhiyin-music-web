name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！好的想法是项目进步的动力。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 您希望解决什么问题？或者当前的哪些体验让您不满意？
      placeholder: 请描述您遇到的痛点或使用场景...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述您理想中的功能表现
      placeholder: 我希望...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过的其他替代方案
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - 播放器
        - 音乐库管理
        - 音乐刮削 / 元数据
        - 文件整理
        - 离线模式
        - UI / 交互
        - 系统 / 配置
        - 其他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 相关截图、参考链接或其他说明
    validations:
      required: false
