name: Bug Report
description: 报告一个 Bug
title: "[Bug] "
labels: ["bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告问题！请尽可能详细地填写以下信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出复现问题的步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望看到的正确行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的错误行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 浏览器版本、操作系统等
      placeholder: |
        - 浏览器: Chrome 125
        - 操作系统: macOS 15.x
        - 应用版本: v0.6.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 相关日志 / 截图
      description: 如有控制台日志或截图请附上
    validations:
      required: false
