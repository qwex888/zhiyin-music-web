name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告问题！请尽量填写以下信息，帮助我们快速定位和修复问题。

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 您使用的知音版本（可在 设置 > 系统 中查看）
      placeholder: "例如: 0.5.3"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - Docker
        - 手动编译
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰地描述发生了什么问题
      placeholder: 请描述您遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 告诉我们如何复现该问题
      placeholder: |
        1. 进入 ...
        2. 点击 ...
        3. 发现 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生什么
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志
      description: 如有相关截图或浏览器控制台日志，请粘贴在此
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: 浏览器
      placeholder: "例如: Chrome 126, Safari 18"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "例如: macOS 15, Windows 11, Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他您认为有帮助的信息
    validations:
      required: false
